[tasks.install]
help = "Install backend (uv) and frontend (npm) dependencies."
sequence = [
  { cmd = "uv sync" },
  { cmd = "npm ci", cwd = "frontend" },
]

[tasks.build]
help = "Build the React SPA into frontend/dist."
cmd = "npm run build"
cwd = "frontend"

# ──────────────────────────────────────────────────────────────────────────────
# Mode 1 — Local Development
# ──────────────────────────────────────────────────────────────────────────────

[tasks.dev]
help = "Run the UI. Override KRATOS_PUBLIC_URL / PORT as needed."
cmd = "uv run kratos-selfservice-ui"
env = { ORY_CONFIG.default = '{"project":{"name":"Company"},"intl":{"locale":"de"}}', KRATOS_PUBLIC_URL.default = "http://host.docker.internal:4433", PORT.default = "4455" }

[tasks.dev-up]
help = "One-shot: install + build + run the UI."
sequence = ["install", "build", "dev"]

# ──────────────────────────────────────────────────────────────────────────────
# Mode 2 — Container
# ──────────────────────────────────────────────────────────────────────────────

[tasks.docker-build]
help = "Build the production container image."
cmd = "docker build -t kratos-selfservice-ui:dev ."

[tasks.docker-run]
help = "Run the production image. Override KRATOS_PUBLIC_URL / ORY_CONFIG as needed."
env = { KRATOS_PUBLIC_URL.default = "http://host.docker.internal:4433", ORY_CONFIG.default = '{"project":{"name":"Company"},"intl":{"locale":"fr"}}' }
cmd = """
docker run --rm --name kratos-ui
  -p 4455:4455
  -e KRATOS_PUBLIC_URL
  -e ORY_CONFIG
  kratos-selfservice-ui:dev
"""

[tasks.docker-up]
help = "One-shot: install + build + run the UI."
sequence = ["docker-build", "docker-run"]
